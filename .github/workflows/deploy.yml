name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  ci:
    name: Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma client
        run: |
          cd backend
          npx prisma generate

  deploy:
    name: Deploy to Production
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Install SSH client utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass

      - name: Deploy to VPS via password auth
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_HEALTH_URL: ${{ secrets.VPS_HEALTH_URL }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_HOST}" ] || [ -z "${VPS_PASSWORD}" ]; then
            echo "Missing required secrets: VPS_HOST or VPS_PASSWORD"
            exit 1
          fi

          USER_NAME="${VPS_USER:-root}"
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-}"
          HEALTH_URL="${VPS_HEALTH_URL:-http://localhost:5000/health}"

          sshpass -p "${VPS_PASSWORD}" ssh \
            -p "${PORT}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o PreferredAuthentications=password,keyboard-interactive \
            -o PubkeyAuthentication=no \
            -o HostKeyAlgorithms=+ssh-rsa \
            -o PubkeyAcceptedAlgorithms=+ssh-rsa \
            -o NumberOfPasswordPrompts=1 \
            "${USER_NAME}@${VPS_HOST}" APP_DIR="${APP_DIR}" HEALTH_URL="${HEALTH_URL}" 'bash -s' << 'EOF'
              set -e
              HEALTH_URL="${HEALTH_URL:-http://localhost:5000/health}"

              CANDIDATE_DIRS=""
              if [ -n "${APP_DIR}" ]; then
                CANDIDATE_DIRS="${APP_DIR}"
              fi
              CANDIDATE_DIRS="${CANDIDATE_DIRS} /var/www/pranijheightsindia /var/www/pranjil-heights"

              DEPLOYED_DIR=""
              for DIR in ${CANDIDATE_DIRS}; do
                if [ -d "${DIR}" ]; then
                  echo "📥 Deploying in ${DIR}"
                  cd "${DIR}"

                  git fetch origin main
                  git reset --hard origin/main

                  echo "📦 Installing backend dependencies..."
                  cd backend
                  npm install --production
                  npx prisma generate
                  npx prisma db push
                  cd ..

                  echo "🏗️ Building frontend..."
                  npm install
                  npm run build

                  DEPLOYED_DIR="${DIR}"
                fi
              done

              if [ -z "${DEPLOYED_DIR}" ]; then
                echo "❌ No valid deployment directory found"
                exit 1
              fi

              echo "🔄 Restarting backend..."
              pm2 describe pranijheightsindia-api > /dev/null && pm2 restart pranijheightsindia-api || true
              pm2 describe pranjil-api > /dev/null && pm2 restart pranjil-api || true

              if ! pm2 describe pranijheightsindia-api > /dev/null && ! pm2 describe pranjil-api > /dev/null; then
                cd "${DEPLOYED_DIR}/backend"
                pm2 start src/server.js --name pranijheightsindia-api
              fi

              pm2 save

              echo "🩺 Running health check..."
              sleep 3
              curl -fsS "$HEALTH_URL" > /dev/null

              echo "🧪 Verifying backend API identity..."
              API_JSON=$(curl -fsS "http://localhost:5000/api")
              echo "$API_JSON" | grep -q "Pranijheightsindia API v1.0" || {
                echo "❌ Backend API identity mismatch after deploy"
                echo "API response: $API_JSON"
                exit 1
              }

              echo "✅ Deployment complete!"
              pm2 status
          EOF
